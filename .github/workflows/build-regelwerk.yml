name: Build Regelwerk

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - closed
    paths:
      - 'Regelwerk/**'
      - '!Regelwerk/build/**'
      - '.github/workflows/build-regelwerk.yml'
      - '.gitignore'
  workflow_run:
    workflows:
      - Automatische Build-Version
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: regelwerk-pages
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  build-pdf:
    if: >-
      (github.event_name != 'pull_request' || github.event.action != 'closed') &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Dokumentversion bestimmen
        id: document-version
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const semanticTag = /^v(\d+)\.(\d+)\.(\d+)$/;
            const dateFormatter = new Intl.DateTimeFormat("de-DE", {
              day: "2-digit",
              month: "2-digit",
              year: "numeric",
              timeZone: "Europe/Berlin",
            });

            const releases = await github.paginate(
              github.rest.repos.listReleases,
              {
                owner,
                repo,
                per_page: 100,
              },
            );

            const semanticReleases = releases
              .filter((release) => !release.draft)
              .map((release) => {
                const match = semanticTag.exec(release.tag_name);
                if (!match) {
                  return null;
                }

                return {
                  release,
                  major: Number(match[1]),
                  minor: Number(match[2]),
                  patch: Number(match[3]),
                };
              })
              .filter(Boolean)
              .sort(
                (left, right) =>
                  right.major - left.major ||
                  right.minor - left.minor ||
                  right.patch - left.patch,
              );

            async function resolveTagCommit(tagName) {
              try {
                const ref = await github.rest.git.getRef({
                  owner,
                  repo,
                  ref: `tags/${tagName}`,
                });

                let object = ref.data.object;
                while (object.type === "tag") {
                  const tag = await github.rest.git.getTag({
                    owner,
                    repo,
                    tag_sha: object.sha,
                  });
                  object = tag.data.object;
                }

                return object.type === "commit" ? object.sha : null;
              } catch (error) {
                if (error.status === 404) {
                  return null;
                }
                throw error;
              }
            }

            if (context.eventName === "pull_request") {
              const highest = semanticReleases[0];
              const nextVersion = highest
                ? `${highest.major}.${highest.minor}.${highest.patch + 1}`
                : "0.0.1";

              core.setOutput(
                "version",
                `${nextVersion}-PR${context.payload.pull_request.number}`,
              );
              core.setOutput("status", "Vorschau");
              core.setOutput("date", dateFormatter.format(new Date()));
              return;
            }

            if (context.eventName === "workflow_run") {
              const commitSha = context.payload.workflow_run.head_sha;
              const matchingReleases = [];

              for (const entry of semanticReleases) {
                const tagCommit = await resolveTagCommit(entry.release.tag_name);
                if (tagCommit === commitSha) {
                  matchingReleases.push(entry);
                }
              }

              const currentRelease = matchingReleases[0];
              if (!currentRelease) {
                core.setFailed(
                  `Kein veröffentlichtes SemVer-Release für Commit ${commitSha} gefunden.`,
                );
                return;
              }

              core.setOutput("version", currentRelease.release.tag_name.slice(1));
              core.setOutput("status", "Version");
              core.setOutput(
                "date",
                dateFormatter.format(
                  new Date(
                    currentRelease.release.published_at ||
                      currentRelease.release.created_at,
                  ),
                ),
              );
              return;
            }

            const latest = semanticReleases[0];
            if (!latest) {
              core.setFailed("Kein veröffentlichtes SemVer-Release gefunden.");
              return;
            }

            core.setOutput("version", latest.release.tag_name.slice(1));
            core.setOutput("status", "Version");
            core.setOutput(
              "date",
              dateFormatter.format(
                new Date(latest.release.published_at || latest.release.created_at),
              ),
            );

      - name: Versionsinformationen für LaTeX vorbereiten
        run: |
          mkdir -p Regelwerk/shared
          printf '%s\n' \
            '\renewcommand{\HPDocumentVersion}{${{ steps.document-version.outputs.version }}}' \
            '\renewcommand{\HPDocumentDate}{${{ steps.document-version.outputs.date }}}' \
            '\renewcommand{\HPDocumentStatus}{${{ steps.document-version.outputs.status }}}' \
            > Regelwerk/shared/version-info.generated.tex

      - name: Inkscape installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y inkscape

      - name: SVG-Icons in PDF-Vektorgrafiken konvertieren
        run: |
          mkdir -p Regelwerk/assets/icons/generated
          find Regelwerk/assets/icons -maxdepth 1 -type f -name '*.svg' -print0 |
            while IFS= read -r -d '' svg; do
              name="$(basename "${svg}" .svg)"
              inkscape "${svg}" \
                --export-type=pdf \
                --export-filename="Regelwerk/assets/icons/generated/${name}.pdf"
            done

          test -f Regelwerk/assets/icons/generated/icon-die-white.pdf

      - name: LaTeX kompilieren
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: Regelwerk
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      - name: PDF für Veröffentlichung vorbereiten
        run: |
          mkdir -p publish
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            cp Regelwerk/main.pdf "publish/Heldenpfade-Regelwerk-PR-${{ github.event.pull_request.number }}.pdf"
          else
            cp Regelwerk/main.pdf publish/Heldenpfade-Regelwerk.pdf
          fi

      - name: PR-Vorschau auf gh-pages veröffentlichen
        if: github.event_name == 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: publish
          destination_dir: pr-preview/pr-${{ github.event.pull_request.number }}
          keep_files: true

      - name: Link zur PR-Vorschau kommentieren
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const marker = '<!-- regelwerk-preview -->';
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/pr-preview/pr-${context.issue.number}/Heldenpfade-Regelwerk-PR-${context.issue.number}.pdf`;
            const body = `${marker}\n📄 **Regelwerk-Vorschau:** ${url}`;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              },
            );
            const existing = comments.find(
              (comment) =>
                comment.user.type === 'Bot' && comment.body.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Aktuelles Regelwerk auf gh-pages veröffentlichen
        if: >-
          github.event_name == 'workflow_run' ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: publish
          keep_files: true

  cleanup-pr-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: gh-pages auschecken
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: PR-Vorschau entfernen
        run: |
          preview_dir="pr-preview/pr-${{ github.event.pull_request.number }}"
          if [[ ! -d "${preview_dir}" ]]; then
            echo "Keine Vorschau vorhanden."
            exit 0
          fi

          rm -rf "${preview_dir}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ci: remove preview for PR #${{ github.event.pull_request.number }}"
          git push origin gh-pages
