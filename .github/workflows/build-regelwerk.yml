name: Build Regelwerk

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - closed
    paths:
      - 'Regelwerk/**'
      - '!Regelwerk/build/**'
      - '.github/workflows/build-regelwerk.yml'
      - '.gitignore'
  release:
    types:
      - published
  workflow_run:
    workflows:
      - Automatische Build-Version
    types:
      - completed
  workflow_dispatch: