name: Build Regelwerk

on:
  push:
    paths:
      - 'Regelwerk/**'
      - '!Regelwerk/build/**'
      - '.github/workflows/build-regelwerk.yml'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: LaTeX kompilieren
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: Regelwerk

      - name: PDF in Regelwerk/build ablegen
        run: |
          mkdir -p Regelwerk/build
          cp Regelwerk/main.pdf Regelwerk/build/Heldenpfade-Regelwerk.pdf

      - name: PDF committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add -f Regelwerk/build/Heldenpfade-Regelwerk.pdf
          
          if git diff --cached --quiet; then
            echo "PDF ist unverändert. Kein Commit notwendig."
          else
            git commit -m "ci: update generated Regelwerk PDF"
            git push
          fi
