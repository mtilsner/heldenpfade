name: Build Regelwerk

on:
  push:
    paths:
      - 'Regelwerk/**'
      - '.github/workflows/build-regelwerk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: LaTeX kompilieren
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: Regelwerk

      - name: PDF in Build ablegen
        run: |
          mkdir -p Build
          cp Regelwerk/main.pdf Build/Heldenpf