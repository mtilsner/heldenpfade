name: Build Regelwerk

on:
  pull_request:
    branches:
      - main
    paths:
      - 'Regelwerk/**'
      - '!Regelwerk/build/**'
      - '.github/workflows/build-regelwerk.yml'
      - '.gitignore'
  push:
    branches:
      - main
    paths:
      - 'Regelwerk/**'
      - '!Regelwerk/build/**'
      - '.github/workflows/build-regelwerk.yml'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: build-regelwerk-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Inkscape installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y inkscape

      - name: SVG-Icons in PDF-Vektorgrafiken konvertieren
        run: |
          mkdir -p Regelwerk/assets/icons/generated
          find Regelwerk/assets/icons -maxdepth 1 -type f -name '*.svg' -print0 |
            while IFS= read -r -d '' svg; do
              name="$(basename "${svg}" .svg)"
              inkscape "${svg}" \
                --export-type=pdf \
                --export-filename="Regelwerk/assets/icons/generated/${name}.pdf"
            done

          test -f Regelwerk/assets/icons/generated/icon-die-white.pdf

      - name: LaTeX kompilieren
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: Regelwerk
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      - name: PDF für Veröffentlichung vorbereiten
        run: |
          mkdir -p publish
          cp Regelwerk/main.pdf publish/Heldenpfade-Regelwerk.pdf

      - name: PR-PDF als Artefakt hochladen
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: Heldenpfade-Regelwerk-PR-${{ github.event.pull_request.number }}
          path: publish/Heldenpfade-Regelwerk.pdf
          retention-days: 14
          if-no-files-found: error

      - name: GitHub Pages konfigurieren
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Pages-Artefakt hochladen
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: publish

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-pdf
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Regelwerk auf GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
