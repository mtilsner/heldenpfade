name: Build Regelwerk

on:
  push:
    paths:
      - 'Regelwerk/**'
      - '.github/workflows/build-regelwerk.yml'
  pull_request:
    paths:
      - 'Regelwerk/**'
      - '.github/workflows/build-regelwerk.yml'

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: LaTeX kompilieren
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: Regelwerk

      - name: PDF als Artefakt bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: heldenpfade-regelwerk
          path: Regelwerk/main.pdf
