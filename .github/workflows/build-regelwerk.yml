name: Build Regelwerk

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - closed
    paths:
      - 'Regelwerk/**'
      - '!Regelwerk/build/**'
      - '.github/workflows/build-regelwerk.yml'
      - '.gitignore'
  push:
    branches:
      - main
    paths:
      - 'Regelwerk/**'
      - '!Regelwerk/build/**'
      - '.github/workflows/build-regelwerk.yml'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: regelwerk-pages
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  build-pdf:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Inkscape installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y inkscape

      - name: SVG-Icons in PDF-Vektorgrafiken konvertieren
        run: |
          mkdir -p Regelwerk/assets/icons/generated
          find Regelwerk/assets/icons -maxdepth 1 -type f -name '*.svg' -print0 |
            while IFS= read -r -d '' svg; do
              name="$(basename "${svg}" .svg)"
              inkscape "${svg}" \
                --export-type=pdf \
                --export-filename="Regelwerk/assets/icons/generated/${name}.pdf"
            done

          test -f Regelwerk/assets/icons/generated/icon-die-white.pdf

      - name: LaTeX kompilieren
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: Regelwerk
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      - name: PDF für Veröffentlichung vorbereiten
        run: |
          mkdir -p publish
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            cp Regelwerk/main.pdf "publish/Heldenpfade-Regelwerk-PR-${{ github.event.pull_request.number }}.pdf"
          else
            cp Regelwerk/main.pdf publish/Heldenpfade-Regelwerk.pdf
          fi

      - name: PR-Vorschau auf gh-pages veröffentlichen
        if: github.event_name == 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: publish
          destination_dir: pr-preview/pr-${{ github.event.pull_request.number }}
          keep_files: true

      - name: Link zur PR-Vorschau kommentieren
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- regelwerk-preview -->';
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/pr-preview/pr-${context.issue.number}/Heldenpfade-Regelwerk-PR-${context.issue.number}.pdf`;
            const body = `${marker}\n📄 **Regelwerk-Vorschau:** ${url}`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Aktuelles Regelwerk auf gh-pages veröffentlichen
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: publish
          keep_files: true

  cleanup-pr-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: gh-pages auschecken
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: PR-Vorschau entfernen
        run: |
          preview_dir="pr-preview/pr-${{ github.event.pull_request.number }}"
          if [[ ! -d "${preview_dir}" ]]; then
            echo "Keine Vorschau vorhanden."
            exit 0
          fi

          rm -rf "${preview_dir}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ci: remove preview for PR #${{ github.event.pull_request.number }}"
          git push origin gh-pages
