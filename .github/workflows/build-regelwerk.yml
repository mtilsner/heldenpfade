name: Build Regelwerk

on:
  push:
    paths:
      - 'Regelwerk/**'
      - '!Regelwerk/build/**'
      - '.github/workflows/build-regelwerk.yml'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: build-regelwerk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: LaTeX kompilieren
        uses: xu-cheng/latex-action@v3
        with:
          root_file: