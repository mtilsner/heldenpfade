name: Build Regelwerk

on:
  push:
    paths:
      - 'Regelwerk/**'
      - '!Regelwerk/Build/**'
      - '.github/workflows/build-regelwerk.yml'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest

