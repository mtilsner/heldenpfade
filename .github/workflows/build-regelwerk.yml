name: Build Regelwerk

on:
  push:
    paths:
      - 'Regelwerk/**'
      - '!Regelwerk/build/**'
      - '.github/workflows/build-regelwerk.yml'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: build-regelwerk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: LaTeX kompilieren
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: Regelwerk
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode -shell-escape

      - name: PDF in Regelwerk/build ablegen
        run: |
          mkdir -p Regelwerk/build
          cp Regelwerk/main.pdf Regelwerk/build/Heldenpfade-Regelwerk.pdf

      - name: PDF committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f Regelwerk/build/Heldenpfade-Regelwerk.pdf

          if git diff --cached --quiet; then
            echo "PDF ist unverändert. Kein Commit notwendig."
            exit 0
          fi

          git commit -m "ci: update generated Regelwerk PDF"

          if ! git push origin "HEAD:${GITHUB_REF_NAME}"; then
            echo "Der Branch wurde während des Builds aktualisiert. Rebase und erneuter Push."
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
